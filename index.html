<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AV.DOC</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            background: #f4f4f9;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            background: #f55036; /* Cor da Groq */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:disabled {
            background: #ccc;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-left: 5px solid #f55036;
            background: #e9ecef;
            display: none;
        }

        .loading {
            display: none;
            color: #666;
            font-style: italic;
        }

        h1 { color: #333; }
    </style>
</head>

<body>

    <h1>AV.DOC</h1>
    <p>Avaliação documental</p>

    <div class="box">
        <h3>Pergunta:</h3>
        <p id="pergunta-texto">A carregar pergunta...</p>

        <strong>Sua Resposta:</strong>
        <textarea id="resposta" rows="6" placeholder="Escreva a resposta aqui..."></textarea>

        <button id="btn-avaliar" onclick="avaliar()">Enviar</button>
        <p id="status" class="loading">A IA está a processar...</p>
    </div>

    <div id="resultado" class="box result">
        <h3>Veredito da IA:</h3>
        <p><strong>Nota:</strong> <span id="nota-final">-</span> / 1.0</p>
        <p><strong>Justificação:</strong></p>
        <div id="feedback-ia"></div>
    </div>

    <script src="questoes.js"></script>
    <script>
        const API_KEY = "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";
        let questaoAtual = null;

        window.onload = () => {
            if (typeof QUESTOES_DADOS !== 'undefined' && QUESTOES_DADOS.length > 0) {
                questaoAtual = QUESTOES_DADOS[0];
                document.getElementById('pergunta-texto').innerText = questaoAtual.pergunta;
            }
        };

        async function avaliar() {
            const resposta = document.getElementById('resposta').value;
            if (resposta.length < 10) return alert("Escreva uma resposta mais detalhada.");

            const btn = document.getElementById('btn-avaliar');
            const status = document.getElementById('status');
            const resBox = document.getElementById('resultado');

            btn.disabled = true;
            status.style.display = 'block';
            resBox.style.display = 'none';

            const systemPrompt = `
            
            PERGUNTA: ${q.pergunta}
            
            CRITÉRIOS DE AVALIAÇÃO OBRIGATÓRIOS: ${q.criterios}
            
            RESPOSTA DO ALUNO: "${item.respostaUser}"
            
            Sua tarefa: Retorne APENAS um objeto JSON estrito com dois campos:
            1. "nota": um número de 0.0 a ${q.cotacao_maxima}, refletindo a soma dos critérios atingidos.
            2. "feedback": uma breve string de texto explicando o que ele acertou, o que errou de acordo com os critérios. Não use marcação markdown na justificação."`
            
            const userPrompt = `Pergunta: ${questaoAtual.pergunta}\nCritérios: ${questaoAtual.criterios}\nResposta do Aluno: ${resposta}`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-oss-120b",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ],
                        temperature: 0.1,
                        response_format: { type: "json_object" } 
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || "Erro na comunicação com a IA");
                }

                const content = data.choices[0].message.content;
                const result = JSON.parse(content);

                document.getElementById('nota-final').innerText = result.nota;
                document.getElementById('feedback-ia').innerText = result.feedback;
                resBox.style.display = 'block';

            } catch (e) {
                console.error(e);
                alert("ERRO NA IA: " + e.message);
            } finally {
                btn.disabled = false;
                status.style.display = 'none';
            }
        }
    </script>
</body>

</html>
